<link rel="stylesheet" href="../css/album.css" />
<link rel="stylesheet" href="../css/header.css" />

<html>
  <head>
    <title>Photography: Monica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <body>
      <header>
        <h1 class="title">Monica</h1>
        <div class="links">
          <a href="../" class="hover">Home</a>
          <a href="../portfolio.html" class="hover">Portfolio</a>
          <a href="../photography.html" class="header_border">Photography</a>
          <a href="../resume.html" class="hover">Resume</a>
          <a href="../contact.html" class="hover">Contact</a>
        </div>
      </header>

      <div class="grid-container">
        <img class="img" id="img" src="../photos/monica/monica1.jpg" alt="monica1" />
        <img class="img" id="img" src="../photos/monica/monica2.jpg" alt="monica2" />
        <img class="img" id="img" src="../photos/monica/monica3.jpg" alt="monica3" />
        <img class="img" id="img" src="../photos/monica/monica4.jpg" alt="monica4" />
        <img class="img" id="img" src="../photos/monica/monica5.jpg" alt="monica5" />
        <img class="img" id="img" src="../photos/monica/monica6.jpg" alt="monica6" />
        <img class="img" id="img" src="../photos/monica/monica7.jpg" alt="monica7" />
        <img class="img" id="img" src="../photos/monica/monica8.jpg" alt="monica8" />
        <img class="img" id="img" src="../photos/monica/monica9.jpg" alt="monica9" />
        <img class="img" id="img" src="../photos/monica/monica10.jpg" alt="monica10" />
        <div id="modal" class="modal">
          <span class="close">&times;</span>
          <img class="modal-content" id="img01" />
          <div id="caption"></div>
        </div>
      </div>

      <script>
        // create references to the modal...
        var modal = document.getElementById("modal");
        // to all images -- note I'm using a class!
        var images = document.getElementsByClassName("img");
        // the image in the modal
        var modalImg = document.getElementById("img01");
        // and the caption in the modal
        var captionText = document.getElementById("caption");

        // Go through all of the images with our custom class
        for (var i = 0; i < images.length; i++) {
          var img = images[i];
          // and attach our click listener for this image.
          img.onclick = function (evt) {
            modal.style.display = "block";
            modalImg.src = this.src;
            captionText.innerHTML = this.alt;
          };
        }

        var span = document.getElementsByClassName("close")[0];

        span.onclick = function () {
          modal.style.display = "none";
        };
      </script>
    </body>
  </head>
</html>
